transport select jtag
adapter driver bcm2835gpio
adapter speed 10

# Raspberry Pi 4 base. If your Pi is older and OpenOCD fails, change to 0x3F000000.
bcm2835gpio_peripheral_base 0xFE000000

# Order: TCK TMS TDI TDO
bcm2835gpio_jtag_nums 11 8 10 9
reset_config none

jtag newtap atmega2560 cpu -irlen 4 -expected-id 0x4980103f

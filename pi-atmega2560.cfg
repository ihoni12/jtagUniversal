transport select jtag
adapter driver bcm2835gpio
adapter speed 10

# Raspberry Pi 4 base. If you use older Pi, change to 0x3F000000.
bcm2835gpio_peripheral_base 0xFE000000

# Order: TCK TMS TDI TDO
# GPIO11 pin físico 23 -> TCK / PF4
# GPIO8  pin físico 24 -> TMS / PF5
# GPIO10 pin físico 19 -> TDI / PF7
# GPIO9  pin físico 21 -> TDO / PF6
bcm2835gpio_jtag_nums 11 8 10 9

reset_config none
jtag newtap avr cpu -irlen 4 -expected-id 0x4980103f
target create avr.cpu avr -chain-position avr.cpu
